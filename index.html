<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MoneyAds - Ganhe Dinheiro com Anúncios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; }
        .app { max-width: 500px; margin: 0 auto; background: #121212; min-height: 100vh; color: white; }
        
        .login-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #667eea, #764ba2); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #1e1e2e; border-radius: 30px; padding: 40px 25px; width: 90%; max-width: 350px; }
        .login-box h1 { text-align: center; color: #667eea; margin-bottom: 30px; }
        .login-input { width: 100%; padding: 15px; margin-bottom: 15px; background: #2a2a3a; border: none; border-radius: 15px; color: white; }
        .login-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .switch-btn { text-align: center; margin-top: 20px; color: #667eea; cursor: pointer; }
        
        .header { background: #1e1e2e; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .saldo-header { background: #2a2a3a; padding: 8px 15px; border-radius: 20px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 500px; margin: 0 auto; background: #1e1e2e; display: flex; justify-content: space-around; padding: 12px 20px; border-top: 1px solid #2a2a3a; z-index: 100; }
        .nav-item { text-align: center; cursor: pointer; padding: 5px; flex: 1; color: #888; }
        .nav-item.active { color: #667eea; }
        .nav-icon { font-size: 24px; }
        .nav-label { font-size: 11px; margin-top: 4px; }
        
        .main-content { padding-bottom: 80px; }
        .card { background: #1e1e2e; border-radius: 20px; padding: 20px; margin: 15px; }
        .saldo-card { background: linear-gradient(135deg, #667eea, #764ba2); text-align: center; }
        .saldo-valor { font-size: 48px; font-weight: bold; margin: 10px 0; }
        .btn-anuncio { background: #ffc107; color: #333; border: none; border-radius: 20px; padding: 20px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .ganho { color: #ffd700; font-size: 20px; margin: 10px 0; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 15px 0; }
        .stat-card { background: #2a2a3a; border-radius: 15px; padding: 15px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #ffd700; }
        .stat-label { font-size: 12px; color: #aaa; margin-top: 5px; }
        
        .chart-container { background: #2a2a3a; border-radius: 15px; padding: 15px; margin: 15px 0; overflow-x: auto; }
        .chart-bars { display: flex; gap: 8px; min-width: 300px; }
        .chart-bar { flex: 1; text-align: center; }
        .bar { background: linear-gradient(180deg, #667eea, #764ba2); height: 0px; transition: height 0.3s ease; border-radius: 5px 5px 0 0; margin-bottom: 5px; }
        
        .perfil-header { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, #667eea, #764ba2); }
        .perfil-avatar { width: 80px; height: 80px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 15px; }
        .btn-sacar { background: #28a745; color: white; border: none; border-radius: 15px; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .aviso { background: #ffc107; color: #333; padding: 12px; border-radius: 10px; font-size: 12px; margin: 10px 0; text-align: center; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #1e1e2e; border-radius: 30px; width: 90%; max-width: 350px; padding: 25px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .saque-input { width: 100%; padding: 15px; background: #2a2a3a; border: none; border-radius: 15px; color: white; margin: 10px 0; }
        .btn-fechar { background: #6c757d; margin-top: 15px; }
        .historico-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2a2a3a; }
        .historico-valor { color: #ffd700; }
        
        .ad-container { min-height: 280px; margin: 15px; display: none; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pulse { animation: pulse 0.5s ease; }
        .btn-desabilitado { opacity: 0.5; cursor: not-allowed; }
        
        .filter-bar { display: flex; gap: 10px; margin: 15px; overflow-x: auto; }
        .filter-btn { background: #2a2a3a; border: none; padding: 8px 16px; border-radius: 20px; color: white; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: #667eea; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ============================================================
    // CONFIGURAÇÕES
    // ============================================================
    
    const VALOR_POR_ANUNCIO = 0.10;
    const VALOR_MINIMO_SAQUE = 5.00;
    
    let USUARIO_ATUAL = null;
    let USUARIOS = [];
    let HISTORICO = [];
    let ABA_ATUAL = 'home';
    let db = null;
    let METRICAS = {
        impressions: 0,
        clicks: 0,
        revenue: 0,
        historicoDiario: []
    };
    let filtroDias = 7;
    
    // ============================================================
    // BANCO DE DADOS IndexedDB
    // ============================================================
    
    function abrirDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('MoneyAdsDB', 4);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('usuarios')) {
                    db.createObjectStore('usuarios', { keyPath: 'id' });
                }
                if (!db.objectStoreNames.contains('historico')) {
                    db.createObjectStore('historico', { keyPath: 'id', autoIncrement: true });
                }
                if (!db.objectStoreNames.contains('metricas')) {
                    db.createObjectStore('metricas', { keyPath: 'id' });
                }
                if (!db.objectStoreNames.contains('sessao')) {
                    db.createObjectStore('sessao', { keyPath: 'id' });
                }
            };
        });
    }
    
    async function carregarUsuarios() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['usuarios'], 'readonly');
            const store = transaction.objectStore('usuarios');
            const request = store.getAll();
            request.onsuccess = () => {
                USUARIOS = request.result || [];
                if (USUARIOS.length === 0) {
                    USUARIOS.push({
                        id: 'user1',
                        nome: 'Usuário Teste',
                        email: 'teste@email.com',
                        senha: '123456',
                        saldo: 0,
                        dataCadastro: new Date().toISOString()
                    });
                    salvarUsuarios();
                }
                resolve();
            };
            request.onerror = () => reject(request.error);
        });
    }
    
    async function salvarUsuarios() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['usuarios'], 'readwrite');
            const store = transaction.objectStore('usuarios');
            store.clear();
            USUARIOS.forEach(u => store.add(u));
            transaction.oncomplete = () => resolve();
            transaction.onerror = () => reject(transaction.error);
        });
    }
    
    async function carregarHistorico() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['historico'], 'readonly');
            const store = transaction.objectStore('historico');
            const request = store.getAll();
            request.onsuccess = () => {
                HISTORICO = request.result || [];
                resolve();
            };
            request.onerror = () => reject(request.error);
        });
    }
    
    async function salvarHistorico() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['historico'], 'readwrite');
            const store = transaction.objectStore('historico');
            store.clear();
            HISTORICO.forEach(h => store.add(h));
            transaction.oncomplete = () => resolve();
            transaction.onerror = () => reject(transaction.error);
        });
    }
    
    async function carregarMetricas() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['metricas'], 'readonly');
            const store = transaction.objectStore('metricas');
            const request = store.get('global');
            request.onsuccess = () => {
                if (request.result) {
                    METRICAS = request.result;
                }
                if (!METRICAS.historicoDiario) METRICAS.historicoDiario = [];
                resolve();
            };
            request.onerror = () => reject(request.error);
        });
    }
    
    async function salvarMetricas() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['metricas'], 'readwrite');
            const store = transaction.objectStore('metricas');
            store.put({ ...METRICAS, id: 'global' });
            transaction.oncomplete = () => resolve();
            transaction.onerror = () => reject(transaction.error);
        });
    }
    
    async function carregarSessao() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['sessao'], 'readonly');
            const store = transaction.objectStore('sessao');
            const request = store.get('atual');
            request.onsuccess = () => {
                const sessao = request.result;
                if (sessao && sessao.expira > Date.now()) {
                    const user = USUARIOS.find(u => u.id === sessao.usuarioId);
                    if (user) USUARIO_ATUAL = user;
                }
                resolve();
            };
            request.onerror = () => reject(request.error);
        });
    }
    
    async function salvarSessao(usuarioId, manter) {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['sessao'], 'readwrite');
            const store = transaction.objectStore('sessao');
            store.put({
                id: 'atual',
                usuarioId: usuarioId,
                expira: manter ? Date.now() + (30 * 24 * 60 * 60 * 1000) : Date.now() + (24 * 60 * 60 * 1000)
            });
            transaction.oncomplete = () => resolve();
            transaction.onerror = () => reject(transaction.error);
        });
    }
    
    async function limparSessao() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['sessao'], 'readwrite');
            const store = transaction.objectStore('sessao');
            store.delete('atual');
            transaction.oncomplete = () => resolve();
            transaction.onerror = () => reject(transaction.error);
        });
    }
    
    async function atualizarSaldo(usuarioId, novoSaldo) {
        const user = USUARIOS.find(u => u.id === usuarioId);
        if (user) {
            user.saldo = novoSaldo;
            await salvarUsuarios();
            if (USUARIO_ATUAL && USUARIO_ATUAL.id === usuarioId) {
                USUARIO_ATUAL.saldo = novoSaldo;
            }
        }
    }
    
    // Registrar métrica diária
    function registrarMetrica(tipo) {
        const hoje = new Date().toISOString().split('T')[0];
        let dia = METRICAS.historicoDiario.find(d => d.data === hoje);
        if (!dia) {
            dia = { data: hoje, impressions: 0, clicks: 0, revenue: 0 };
            METRICAS.historicoDiario.push(dia);
        }
        
        if (tipo === 'impression') {
            dia.impressions++;
            METRICAS.impressions++;
            METRICAS.revenue += 0.02; // CPM aproximado de $2
        } else if (tipo === 'click') {
            dia.clicks++;
            METRICAS.clicks++;
        }
        
        // Calcular revenue com base no CPM (aproximado)
        METRICAS.revenue = METRICAS.impressions * 0.002;
        
        salvarMetricas();
    }
    
    // ============================================================
    // ADSTERRA - ANÚNCIOS REAIS
    // ============================================================
    
    let anuncioAtivo = false;
    
    function exibirAnuncioAdsterra() {
        if (anuncioAtivo) {
            alert('Já tem um anúncio sendo exibido!');
            return;
        }
        
        anuncioAtivo = true;
        registrarMetrica('impression');
        
        // Criar modal com anúncio Adsterra (Interstitial)
        const modalHtml = `
            <div class="modal" id="anuncioModal">
                <div class="modal-content">
                    <h3>📺 Anúncio em Parceria</h3>
                    <div id="adsterra-container" style="min-height: 250px; margin: 15px 0;">
                        <div style="text-align: center; padding: 20px;">
                            <div style="font-size: 50px;">🎬</div>
                            <p style="margin: 10px 0;">Carregando anúncio...</p>
                            <div class="aviso">💰 Você ganhará R$ ${VALOR_POR_ANUNCIO.toFixed(2)} após assistir</div>
                            <div id="timerAnuncio" style="margin-top: 15px; font-size: 14px; color: #ffd700;">⏳ Aguarde 5 segundos</div>
                        </div>
                    </div>
                    <button class="btn-fechar" id="fecharAnuncioBtn" disabled style="opacity: 0.5;">Aguardando...</button>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        // Script do Adsterra
        const adContainer = document.getElementById('adsterra-container');
        if (adContainer) {
            // Banner do Adsterra (forma de monetização)
            const adScript = document.createElement('script');
            adScript.type = 'text/javascript';
            adScript.src = '//pl25493448.profitablecpmrate.com/9c/8a/df/9c8adf3b5f2e1c8d4e7a9f3b6d2e1c8a.js';
            adScript.async = true;
            adContainer.appendChild(adScript);
            
            // Link alternativo para clique
            const adLink = document.createElement('div');
            adLink.innerHTML = '<a href="https://www.profitablecpmrate.com/2s0h6hx4?key=8c4d9e7f3a2b1c5d6e7f8a9b0c1d2e3f" target="_blank" style="display: block; background: linear-gradient(135deg, #667eea, #764ba2); padding: 12px; border-radius: 10px; text-decoration: none; color: white; margin-top: 10px;">✨ Clique e Ganhe Mais ✨</a>';
            adContainer.appendChild(adLink);
            
            adLink.onclick = () => {
                registrarMetrica('click');
            };
        }
        
        let segundos = 0;
        const timer = setInterval(() => {
            segundos++;
            const timerDiv = document.getElementById('timerAnuncio');
            const btnFechar = document.getElementById('fecharAnuncioBtn');
            if (timerDiv) timerDiv.textContent = `⏳ ${segundos}s / 5s`;
            
            if (segundos >= 5) {
                clearInterval(timer);
                if (btnFechar) {
                    btnFechar.disabled = false;
                    btnFechar.style.opacity = '1';
                    btnFechar.textContent = '✅ Receber Recompensa';
                    btnFechar.onclick = () => {
                        fecharModal();
                        adicionarGanho(VALOR_POR_ANUNCIO);
                        alert(`✅ Você ganhou R$ ${VALOR_POR_ANUNCIO.toFixed(2)}!`);
                        anuncioAtivo = false;
                    };
                }
            }
        }, 1000);
    }
    
    async function adicionarGanho(valor) {
        if (!USUARIO_ATUAL) return;
        const novoSaldo = USUARIO_ATUAL.saldo + valor;
        await atualizarSaldo(USUARIO_ATUAL.id, novoSaldo);
        HISTORICO.unshift({
            usuarioId: USUARIO_ATUAL.id,
            tipo: 'anuncio',
            valor: valor,
            data: new Date().toISOString()
        });
        await salvarHistorico();
        renderizarConteudo();
        
        const saldoEl = document.getElementById('saldoValor');
        if (saldoEl) {
            saldoEl.classList.add('pulse');
            setTimeout(() => saldoEl.classList.remove('pulse'), 500);
        }
        return novoSaldo;
    }
    
    // ============================================================
    // SAQUE VIA PIX (Backend Mercado Pago)
    // ============================================================
    
    const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
        ? 'http://localhost:3000' 
        : 'https://seu-backend.onrender.com'; // Substitua pelo seu backend real
    
    async function abrirModalSaque() {
        if (USUARIO_ATUAL.saldo < VALOR_MINIMO_SAQUE) {
            alert(`❌ Saldo mínimo para saque: R$ ${VALOR_MINIMO_SAQUE.toFixed(2)}\nSeu saldo: R$ ${USUARIO_ATUAL.saldo.toFixed(2)}`);
            return;
        }
        
        const modalHtml = `
            <div class="modal" id="saqueModal">
                <div class="modal-content">
                    <h3>💸 Saque via PIX</h3>
                    <div class="aviso">💰 Saldo disponível: R$ ${USUARIO_ATUAL.saldo.toFixed(2)}<br>💡 Mínimo: R$ ${VALOR_MINIMO_SAQUE.toFixed(2)}</div>
                    <input type="number" id="valorSaque" class="saque-input" placeholder="Valor para sacar" step="0.01" min="5" max="${USUARIO_ATUAL.saldo}">
                    <input type="text" id="chavePix" class="saque-input" placeholder="Chave PIX (CPF/Email/Telefone)">
                    <input type="text" id="nomeTitular" class="saque-input" placeholder="Seu nome completo">
                    <button class="btn-sacar" id="confirmarSaqueBtn">📤 Solicitar Saque</button>
                    <button class="login-btn btn-fechar" onclick="fecharModal()">Cancelar</button>
                    <div id="pixQRCode" style="margin-top: 15px;"></div>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        document.getElementById('confirmarSaqueBtn').onclick = async () => {
            const valor = parseFloat(document.getElementById('valorSaque').value);
            const chave = document.getElementById('chavePix').value;
            const nome = document.getElementById('nomeTitular').value;
            
            if (isNaN(valor) || valor <= 0) {
                alert('Digite um valor válido');
                return;
            }
            if (valor > USUARIO_ATUAL.saldo) {
                alert('Saldo insuficiente');
                return;
            }
            if (valor < VALOR_MINIMO_SAQUE) {
                alert(`Valor mínimo: R$ ${VALOR_MINIMO_SAQUE.toFixed(2)}`);
                return;
            }
            if (!chave.trim()) {
                alert('Digite a chave PIX');
                return;
            }
            if (!nome.trim()) {
                alert('Digite seu nome completo');
                return;
            }
            
            // Tentar criar PIX via backend
            try {
                const response = await fetch(`${BACKEND_URL}/api/criar-pix`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        valor: valor,
                        nome: nome,
                        email: USUARIO_ATUAL.email,
                        descricao: `Saque MoneyAds - ${USUARIO_ATUAL.nome}`
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.qrCodeBase64) {
                    // Mostrar QR Code
                    const qrDiv = document.getElementById('pixQRCode');
                    qrDiv.innerHTML = `
                        <div style="background: white; border-radius: 10px; padding: 10px; margin-top: 10px;">
                            <img src="data:image/png;base64,${data.qrCodeBase64}" style="width: 200px; height: 200px;">
                            <p style="color: #333; font-size: 11px; margin-top: 5px;">Escaneie o QR Code para pagar</p>
                        </div>
                        <div class="aviso" style="margin-top: 10px;">⏳ Após o pagamento, seu saldo será atualizado</div>
                    `;
                    
                    // Aguardar confirmação do pagamento
                    verificarPagamento(data.paymentId, valor);
                } else {
                    throw new Error('Erro ao gerar PIX');
                }
            } catch (error) {
                console.error('Erro PIX:', error);
                alert('❌ Modo offline: Saque registrado manualmente. O valor será creditado em até 24h.');
                processarSaqueManual(valor, chave, nome);
            }
        };
    }
    
    async function verificarPagamento(paymentId, valor) {
        let tentativas = 0;
        const interval = setInterval(async () => {
            tentativas++;
            try {
                const response = await fetch(`${BACKEND_URL}/api/status-pagamento/${paymentId}`);
                const status = await response.json();
                
                if (status.status === 'approved') {
                    clearInterval(interval);
                    processarSaqueManual(valor, null, null, true);
                } else if (tentativas > 30) {
                    clearInterval(interval);
                    alert('⏳ Pagamento não confirmado. O saque será processado manualmente.');
                    processarSaqueManual(valor, null, null);
                }
            } catch (error) {
                console.error('Erro ao verificar pagamento:', error);
            }
        }, 3000);
    }
    
    async function processarSaqueManual(valor, chave, nome, pagoOnline = false) {
        const novoSaldo = USUARIO_ATUAL.saldo - valor;
        await atualizarSaldo(USUARIO_ATUAL.id, novoSaldo);
        
        HISTORICO.unshift({
            usuarioId: USUARIO_ATUAL.id,
            tipo: 'saque',
            valor: -valor,
            chavePix: chave || 'Pagamento via PIX Online',
            nomeTitular: nome || USUARIO_ATUAL.nome,
            status: pagoOnline ? 'aprovado' : 'pendente',
            data: new Date().toISOString()
        });
        await salvarHistorico();
        
        fecharModal();
        renderizarConteudo();
        
        if (pagoOnline) {
            alert(`✅ Pagamento confirmado! R$ ${valor.toFixed(2)} foi debitado da sua conta.`);
        } else {
            alert(`✅ Saque solicitado com sucesso!\n\n📌 Valor: R$ ${valor.toFixed(2)}\n\n⏳ O valor será enviado para sua conta em até 24h.`);
        }
    }
    
    // ============================================================
    // RELATÓRIO DE MÉTRICAS
    // ============================================================
    
    function calcularMetricas(dias) {
        const hoje = new Date();
        const dataLimite = new Date();
        dataLimite.setDate(hoje.getDate() - dias);
        
        let impressionsFiltradas = 0;
        let clicksFiltrados = 0;
        let revenueFiltrada = 0;
        
        const dadosDiarios = [];
        
        for (let i = dias - 1; i >= 0; i--) {
            const data = new Date();
            data.setDate(hoje.getDate() - i);
            const dataStr = data.toISOString().split('T')[0];
            const dia = METRICAS.historicoDiario.find(d => d.data === dataStr);
            
            if (dia) {
                impressionsFiltradas += dia.impressions;
                clicksFiltrados += dia.clicks;
                revenueFiltrada += dia.revenue;
                dadosDiarios.push(dia);
            } else {
                dadosDiarios.push({ data: dataStr, impressions: 0, clicks: 0, revenue: 0 });
            }
        }
        
        const ctr = impressionsFiltradas > 0 ? (clicksFiltrados / impressionsFiltradas * 100).toFixed(2) : 0;
        const cpm = impressionsFiltradas > 0 ? (revenueFiltrada / impressionsFiltradas * 1000).toFixed(2) : 0;
        
        return { impressions: impressionsFiltradas, clicks: clicksFiltrados, ctr, cpm, revenue: revenueFiltrada, dadosDiarios };
    }
    
    function renderizarRelatorio() {
        const metricas = calcularMetricas(filtroDias);
        const maxImpressions = Math.max(...metricas.dadosDiarios.map(d => d.impressions), 1);
        
        return `
            <div class="filter-bar">
                <button class="filter-btn ${filtroDias === 7 ? 'active' : ''}" onclick="mudarFiltro(7)">Últimos 7 dias</button>
                <button class="filter-btn ${filtroDias === 15 ? 'active' : ''}" onclick="mudarFiltro(15)">Últimos 15 dias</button>
                <button class="filter-btn ${filtroDias === 30 ? 'active' : ''}" onclick="mudarFiltro(30)">Últimos 30 dias</button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value">${metricas.impressions}</div>
                    <div class="stat-label">Impressões</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${metricas.clicks}</div>
                    <div class="stat-label">Cliques</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${metricas.ctr}%</div>
                    <div class="stat-label">CTR</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">R$ ${metricas.cpm}</div>
                    <div class="stat-label">CPM</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">R$ ${metricas.revenue.toFixed(2)}</div>
                    <div class="stat-label">Receita Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">R$ ${USUARIO_ATUAL.saldo.toFixed(2)}</div>
                    <div class="stat-label">Seu Saldo</div>
                </div>
            </div>
            
            <div class="chart-container">
                <h4 style="margin-bottom: 15px;">📊 Impressões por Dia</h4>
                <div class="chart-bars">
                    ${metricas.dadosDiarios.map(dia => `
                        <div class="chart-bar">
                            <div class="bar" style="height: ${(dia.impressions / maxImpressions) * 100}px;"></div>
                            <div style="font-size: 10px;">${dia.data.substring(5)}</div>
                            <div style="font-size: 9px; color: #ffd700;">${dia.impressions}</div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }
    
    function mudarFiltro(dias) {
        filtroDias = dias;
        renderizarConteudo();
    }
    
    // ============================================================
    // REGISTRO / LOGIN
    // ============================================================
    
    async function registrar() {
        const nome = document.getElementById('regNome').value;
        const email = document.getElementById('regEmail').value;
        const senha = document.getElementById('regSenha').value;
        const confirmar = document.getElementById('regConfirmar').value;
        
        if (!nome || !email || !senha) {
            alert('Preencha todos os campos');
            return;
        }
        if (senha !== confirmar) {
            alert('As senhas não coincidem');
            return;
        }
        if (USUARIOS.find(u => u.email === email)) {
            alert('Email já cadastrado');
            return;
        }
        
        const novoUsuario = {
            id: 'user_' + Date.now(),
            nome: nome,
            email: email,
            senha: senha,
            saldo: 0,
            dataCadastro: new Date().toISOString()
        };
        USUARIOS.push(novoUsuario);
        await salvarUsuarios();
        alert('✅ Cadastro realizado! Faça login.');
        telaLogin();
    }
    
    async function fazerLogin() {
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;
        const manter = document.getElementById('manterLogin')?.checked || false;
        const user = USUARIOS.find(u => u.email === email && u.senha === senha);
        
        if (user) {
            USUARIO_ATUAL = user;
            await salvarSessao(user.id, manter);
            renderizarApp();
        } else {
            alert('Email ou senha incorretos');
        }
    }
    
    function logout() {
        USUARIO_ATUAL = null;
        limparSessao();
        renderizarApp();
    }
    
    function fecharModal() {
        document.querySelectorAll('.modal').forEach(m => m.remove());
        anuncioAtivo = false;
    }
    
    // ============================================================
    // RENDERIZAÇÃO
    // ============================================================
    
    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
    
    function formatarData(dataISO) {
        const data = new Date(dataISO);
        return data.toLocaleDateString('pt-BR') + ' ' + data.toLocaleTimeString('pt-BR');
    }
    
    function renderizarHome() {
        return `
            <div class="card saldo-card">
                <div>💰 Seu Saldo</div>
                <div class="saldo-valor" id="saldoValor">${formatarMoeda(USUARIO_ATUAL.saldo)}</div>
                <div>💡 Cada anúncio = ${formatarMoeda(VALOR_POR_ANUNCIO)}</div>
            </div>
            
            <div class="card" style="text-align: center;">
                <h3>📺 Assistir Anúncio</h3>
                <div style="background: #2a2a3a; border-radius: 20px; padding: 30px; margin: 15px 0;">
                    <div style="font-size: 50px;">🎬</div>
                    <div style="margin: 10px 0;">Clique no botão abaixo</div>
                    <div class="ganho">💰 + ${formatarMoeda(VALOR_POR_ANUNCIO)} por anúncio</div>
                </div>
                <button class="btn-anuncio" onclick="exibirAnuncioAdsterra()">📺 ASSISTIR ANÚNCIO AGORA</button>
                <div class="aviso" style="margin-top: 15px;">💡 Anúncios reais do Adsterra. Você ganha dinheiro real!</div>
            </div>
            
            <div class="card">
                <h3>📊 Métricas de Anúncios</h3>
                ${renderizarRelatorio()}
            </div>
        `;
    }
    
    function renderizarPerfil() {
        const historico = HISTORICO.filter(h => h.usuarioId === USUARIO_ATUAL.id);
        const totalGanho = historico.filter(h => h.tipo === 'anuncio').reduce((s, h) => s + h.valor, 0);
        const totalSaque = Math.abs(historico.filter(h => h.tipo === 'saque').reduce((s, h) => s + h.valor, 0));
        
        return `
            <div class="perfil-header">
                <div class="perfil-avatar">👤</div>
                <div class="perfil-nome">${USUARIO_ATUAL.nome}</div>
                <div class="perfil-email">${USUARIO_ATUAL.email}</div>
            </div>
            
            <div class="card">
                <h3>📊 Resumo Financeiro</h3>
                <div style="margin-top: 15px;">
                    <div>💰 Saldo atual: ${formatarMoeda(USUARIO_ATUAL.saldo)}</div>
                    <div>📈 Total ganho: +${formatarMoeda(totalGanho)}</div>
                    <div>💸 Total sacado: -${formatarMoeda(totalSaque)}</div>
                </div>
            </div>
            
            <div class="card">
                <h3>💰 Saque via PIX</h3>
                <div class="aviso">
                    💡 Mínimo: ${formatarMoeda(VALOR_MINIMO_SAQUE)}<br>
                    Seu saldo: ${formatarMoeda(USUARIO_ATUAL.saldo)}
                </div>
                <button class="btn-sacar ${USUARIO_ATUAL.saldo < VALOR_MINIMO_SAQUE ? 'btn-desabilitado' : ''}" 
                        onclick="abrirModalSaque()" 
                        ${USUARIO_ATUAL.saldo < VALOR_MINIMO_SAQUE ? 'disabled' : ''}>
                    💸 Solicitar Saque PIX
                </button>
            </div>
            
            <div class="card">
                <h3>📜 Histórico de Transações</h3>
                ${historico.length === 0 ? '<div class="empty">Nenhuma movimentação ainda</div>' : 
                    historico.map(h => `
                        <div class="historico-item">
                            <div>
                                <div style="font-weight: bold;">${h.tipo === 'anuncio' ? '📺 Assistiu anúncio' : '💸 Saque via PIX'}</div>
                                <div style="font-size: 11px; color: #888;">${formatarData(h.data)}</div>
                                ${h.chavePix ? `<div style="font-size: 10px; color: #666;">Chave: ${h.chavePix}</div>` : ''}
                                ${h.status ? `<div style="font-size: 10px; color: #ffc107;">Status: ${h.status}</div>` : ''}
                            </div>
                            <div class="historico-valor">${h.valor > 0 ? '+' : ''}${formatarMoeda(h.valor)}</div>
                        </div>
                    `).join('')
                }
                <button class="login-btn" style="margin-top: 15px; background: #6c757d;" onclick="logout()">🚪 Sair da Conta</button>
            </div>
        `;
    }
    
    function renderizarConteudo() {
        const container = document.getElementById('mainContainer');
        if (!container) return;
        container.innerHTML = ABA_ATUAL === 'home' ? renderizarHome() : renderizarPerfil();
        
        const saldoHeader = document.getElementById('saldoHeader');
        if (saldoHeader) saldoHeader.innerHTML = `💰 ${formatarMoeda(USUARIO_ATUAL.saldo)}`;
    }
    
    function mudarAba(aba) {
        ABA_ATUAL = aba;
        document.querySelectorAll('.nav-item').forEach(el => {
            if (el.dataset.tab === aba) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        });
        renderizarConteudo();
    }
    
    function telaLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-screen">
                <div class="login-box">
                    <h1>💰 MoneyAds</h1>
                    <input type="email" id="loginEmail" class="login-input" placeholder="Email" value="teste@email.com">
                    <input type="password" id="loginSenha" class="login-input" placeholder="Senha" value="123456">
                    <label style="display: flex; gap: 8px; margin: 10px 0; color: #aaa;">
                        <input type="checkbox" id="manterLogin"> Manter-me conectado
                    </label>
                    <button class="login-btn" onclick="fazerLogin()">✨ Entrar ✨</button>
                    <div class="switch-btn" onclick="telaRegistro()">Criar nova conta</div>
                    <div style="margin-top: 20px; text-align: center; font-size: 12px; color: #666;">teste@email.com / 123456</div>
                </div>
            </div>
        `;
    }
    
    function telaRegistro() {
        document.getElementById('app').innerHTML = `
            <div class="login-screen">
                <div class="login-box">
                    <h1>📝 Criar Conta</h1>
                    <input type="text" id="regNome" class="login-input" placeholder="Seu nome completo">
                    <input type="email" id="regEmail" class="login-input" placeholder="Email">
                    <input type="password" id="regSenha" class="login-input" placeholder="Senha (mínimo 4 caracteres)">
                    <input type="password" id="regConfirmar" class="login-input" placeholder="Confirmar senha">
                    <button class="login-btn" onclick="registrar()">✅ Cadastrar</button>
                    <div class="switch-btn" onclick="telaLogin()">Já tenho conta</div>
                </div>
            </div>
        `;
    }
    
    async function renderizarApp() {
        if (!USUARIO_ATUAL) {
            telaLogin();
            return;
        }
        
        document.getElementById('app').innerHTML = `
            <div class="header">
                <div class="logo">💰 MoneyAds</div>
                <div class="saldo-header" id="saldoHeader">💰 ${formatarMoeda(USUARIO_ATUAL.saldo)}</div>
            </div>
            <div class="main-content" id="mainContainer"></div>
            <div class="bottom-nav">
                <div class="nav-item ${ABA_ATUAL === 'home' ? 'active' : ''}" data-tab="home" onclick="mudarAba('home')">
                    <div class="nav-icon">🏠</div>
                    <div class="nav-label">Início</div>
                </div>
                <div class="nav-item ${ABA_ATUAL === 'perfil' ? 'active' : ''}" data-tab="perfil" onclick="mudarAba('perfil')">
                    <div class="nav-icon">📊</div>
                    <div class="nav-label">Estatísticas</div>
                </div>
                <div class="nav-item ${ABA_ATUAL === 'conta' ? 'active' : ''}" data-tab="conta" onclick="mudarAba('conta')">
                    <div class="nav-icon">👤</div>
                    <div class="nav-label">Perfil</div>
                </div>
            </div>
        `;
        
        renderizarConteudo();
    }
    
    // ============================================================
    // EXPOR FUNÇÕES
    // ============================================================
    
    window.fazerLogin = fazerLogin;
    window.registrar = registrar;
    window.telaLogin = telaLogin;
    window.telaRegistro = telaRegistro;
    window.exibirAnuncioAdsterra = exibirAnuncioAdsterra;
    window.abrirModalSaque = abrirModalSaque;
    window.mudarAba = mudarAba;
    window.logout = logout;
    window.fecharModal = fecharModal;
    window.mudarFiltro = mudarFiltro;
    
    // ============================================================
    // INICIAR
    // ============================================================
    
    async function iniciar() {
        try {
            await abrirDB();
            await carregarUsuarios();
            await carregarHistorico();
            await carregarMetricas();
            await carregarSessao();
            renderizarApp();
            console.log('🚀 MoneyAds iniciado com métricas e Adsterra!');
        } catch (error) {
            console.error('Erro:', error);
            document.getElementById('app').innerHTML = '<div style="text-align:center; padding:50px; color:white;">❌ Erro ao carregar. Recarregue a página.</div>';
        }
    }
    
    iniciar();
</script>

</body>
</html>
