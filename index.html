    // ============================================================

    // ============================================================
    // BANCO DE DADOS

    function abrirDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('MoneyAdsDB', 6);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('usuarios')) {
                    db.createObjectStore('usuarios', { keyPath: 'id' });
                }
                if (!db.objectStoreNames.contains('historico')) {
                    db.createObjectStore('historico', { keyPath: 'id', autoIncrement: true });
                }
                if (!db.objectStoreNames.contains('sessao')) {
                    db.createObjectStore('sessao', { keyPath: 'id' });
                }
            };
        });
    }
    
    async function carregarUsuarios() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['usuarios'], 'readonly');
            const store = transaction.objectStore('usuarios');
            const request = store.getAll();
            request.onsuccess = () => {
                USUARIOS = request.result || [];
                if (USUARIOS.length === 0) {
                    USUARIOS.push({
                        id: 'user1',
                        nome: 'Usuário Teste',
                        email: 'teste@email.com',
                        senha: '123456',
                        saldo: 0,
                        dataCadastro: new Date().toISOString(),
                        dailyBonus: {},
                        indicacoes: [],
                        tarefasConcluidas: {}
                    });
                    salvarUsuarios();
                }
                resolve();
            };
            request.onerror = () => reject(request.error);
        });
    }
    
    async function salvarUsuarios() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['usuarios'], 'readwrite');
            const store = transaction.objectStore('usuarios');
            store.clear();
            USUARIOS.forEach(u => store.add(u));
            transaction.oncomplete = () => resolve();
            transaction.onerror = () => reject(transaction.error);
        });
    }
    
    async function carregarHistorico() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['historico'], 'readonly');
            const store = transaction.objectStore('historico');
            const request = store.getAll();
            request.onsuccess = () => {
                HISTORICO = request.result || [];
                resolve();
            };
            request.onerror = () => reject(request.error);
        });
    }
    
    async function salvarHistorico() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['historico'], 'readwrite');
            const store = transaction.objectStore('historico');
            store.clear();
            HISTORICO.forEach(h => store.add(h));
            transaction.oncomplete = () => resolve();
            transaction.onerror = () => reject(transaction.error);
        });
    }
    
    async function carregarSessao() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['sessao'], 'readonly');
            const store = transaction.objectStore('sessao');
            const request = store.get('atual');
            request.onsuccess = () => {
                const sessao = request.result;
                if (sessao && sessao.expira > Date.now()) {
                    const user = USUARIOS.find(u => u.id === sessao.usuarioId);
                    if (user) USUARIO_ATUAL = user;
                }
                resolve();
            };
            request.onerror = () => reject(request.error);
        });
    }
    
    async function salvarSessao(usuarioId, manter) {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['sessao'], 'readwrite');
            const store = transaction.objectStore('sessao');
            store.put({
                id: 'atual',
                usuarioId: usuarioId,
                expira: manter ? Date.now() + (30 * 24 * 60 * 60 * 1000) : Date.now() + (24 * 60 * 60 * 1000)
            });
            transaction.oncomplete = () => resolve();
            transaction.onerror = () => reject(transaction.error);
        });
    }
    
    async function limparSessao() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['sessao'], 'readwrite');
            const store = transaction.objectStore('sessao');
            store.delete('atual');
            transaction.oncomplete = () => resolve();
            transaction.onerror = () => reject(transaction.error);
        });
    }
    
    async function atualizarSaldo(usuarioId, novoSaldo) {
        const user = USUARIOS.find(u => u.id === usuarioId);
        if (user) {
            user.saldo = novoSaldo;
            await salvarUsuarios();
            if (USUARIO_ATUAL && USUARIO_ATUAL.id === usuarioId) {
                USUARIO_ATUAL.saldo = novoSaldo;
            }
        }
    }
    
    async function adicionarGanho(valor, motivo) {
        if (!USUARIO_ATUAL) return;
        const novoSaldo = USUARIO_ATUAL.saldo + valor;
        await atualizarSaldo(USUARIO_ATUAL.id, novoSaldo);
        HISTORICO.unshift({
            usuarioId: USUARIO_ATUAL.id,
            tipo: motivo,
            valor: valor,
            data: new Date().toISOString()
        });
        await salvarHistorico();
        renderizarConteudo();
        
        const saldoEl = document.getElementById('saldoValor');
        if (saldoEl) {
            saldoEl.classList.add('pulse');
            setTimeout(() => saldoEl.classList.remove('pulse'), 500);
        }
        return novoSaldo;
    }
    
    // ============================================================
    // 1. ANÚNCIOS VÍDEO (Original)
    // ============================================================
    
    let anuncioAtivo = false;
    
    function assistirAnuncio() {
        if (anuncioAtivo) {
            alert('Já tem um anúncio sendo exibido!');
            return;
        }
        
        anuncioAtivo = true;
        
        const modalHtml = `
            <div class="modal" id="anuncioModal">

                    <h3>📺 Assistindo Anúncio</h3>

                    <button class="btn-fechar" id="btnFecharAnuncio" disabled style="opacity: 0.5;">Aguardando 10s...</button>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        let segundos = 0;
        const timer = setInterval(() => {
            segundos++;
            const restante = 10 - segundos;
            const timerCircle = document.getElementById('timerCircle');
            const timerText = document.getElementById('timerText');
            if (timerCircle) timerCircle.textContent = restante;
            if (timerText) timerText.textContent = `⏳ Aguarde ${restante} segundos...`;
            
            if (segundos >= 10) {
                clearInterval(timer);
                const btn = document.getElementById('btnFecharAnuncio');
                if (btn) {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    btn.textContent = '💰 RECEBER R$ 0,10';

    // ============================================================
    // 2. ROLETA DA SORTE
    // ============================================================
    
    let girando = false;
    
    function girarRoleta() {
        if (girando) {
            alert('Aguarde a roleta parar!');

        }
        
        const premios = [0.05, 0.10, 0.25, 0.50, 1.00, 2.00, 5.00, 0.01];

    // ============================================================
    // 3. BÔNUS DIÁRIO

    async function reclamarBonusDiario() {
        if (!USUARIO_ATUAL.dailyBonus) USUARIO_ATUAL.dailyBonus = {};
        
        const hoje = new Date().toISOString().split('T')[0];
        const ultimoBonus = USUARIO_ATUAL.dailyBonus.ultimo;
        
        if (ultimoBonus === hoje) {
            alert('❌ Você já reclamou o bônus de hoje! Volte amanhã.');
            return;
        }
        
        const streak = USUARIO_ATUAL.dailyBonus.streak || 0;
        let novoStreak = streak + 1;
        let bonus = 0.10;
        
        if (novoStreak === 1) bonus = 0.10;
        else if (novoStreak === 2) bonus = 0.20;
        else if (novoStreak === 3) bonus = 0.35;
        else if (novoStreak === 4) bonus = 0.50;
        else if (novoStreak === 5) bonus = 0.75;
        else if (novoStreak === 6) bonus = 1.00;
        else if (novoStreak >= 7) bonus = 2.00;
        
        USUARIO_ATUAL.dailyBonus.ultimo = hoje;
        USUARIO_ATUAL.dailyBonus.streak = novoStreak;
        await salvarUsuarios();
        
        await adicionarGanho(bonus, `daily_bonus_dia_${novoStreak}`);
        alert(`✅ Bônus diário! Dia ${novoStreak} - Você ganhou R$ ${bonus.toFixed(2)}!`);
        renderizarConteudo();
    }

        if (tarefa.concluida) {
            alert('❌ Você já completou esta tarefa hoje!');
            return;
        }
        
        tarefa.concluida = true;
        adicionarGanho(tarefa.premio, `tarefa_${tarefa.nome}`);
        alert(`✅ Tarefa "${tarefa.nome}" concluída! +R$ ${tarefa.premio.toFixed(2)}`);
        renderizarConteudo();
    }
    
    // ============================================================
    // 8. MINI JOGO - CLIQUE E GANHE
    // ============================================================
    
    function jogarCliqueGanhe() {
        let cliques = 0;
        const tempo = 10;
        
        const modalHtml = `
            <div class="modal" id="jogoModal">
                <div class="modal-content">
                    <h3>🎯 Clique Rápido!</h3>
                    <div class="timer-circle" id="jogoTimer">10</div>
                    <div style="font-size: 48px; text-align: center; margin: 20px;" id="botaoClick">🔘</div>
                    <div id="contagem">Cliques: 0</div>
                    <div id="jogoResultado"></div>
                    <button class="btn-fechar" id="btnJogo" disabled>Aguardando...</button>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        const botao = document.getElementById('botaoClick');
        const contagemDiv = document.getElementById('contagem');
        const timerDiv = document.getElementById('jogoTimer');
        const btnJogo = document.getElementById('btnJogo');
        
        let tempoRestante = tempo;
        botao.style.cursor = 'pointer';
        
        const timer = setInterval(() => {
            tempoRestante--;
            timerDiv.textContent = tempoRestante;
            
            if (tempoRestante <= 0) {
                clearInterval(timer);
                botao.style.pointerEvents = 'none';
                const ganho = cliques * 0.01;
                document.getElementById('jogoResultado').innerHTML = `🎉 Você fez ${cliques} cliques! Ganhou R$ ${ganho.toFixed(2)}! 🎉`;
                btnJogo.disabled = false;
                btnJogo.textContent = `💰 Receber R$ ${ganho.toFixed(2)}`;
                btnJogo.onclick = async () => {
                    await adicionarGanho(ganho, 'click_game');
                    fecharModal();
                    alert(`✅ Você ganhou R$ ${ganho.toFixed(2)} no jogo!`);
                };
            }
        }, 1000);
        
        botao.onclick = () => {
            if (tempoRestante > 0) {
                cliques++;
                contagemDiv.textContent = `Cliques: ${cliques}`;
                botao.style.transform = 'scale(0.95)';
                setTimeout(() => { botao.style.transform = 'scale(1)'; }, 100);
            }
        };
    }
    
    // ============================================================
    // 9. VÍDEO BÔNUS
    // ============================================================
    
    function assistirVideoBonus() {
        if (anuncioAtivo) {
            alert('Aguarde o anúncio atual terminar!');
            return;
        }
        
        anuncioAtivo = true;
        
        const modalHtml = `
            <div class="modal" id="bonusModal">
                <div class="modal-content">
                    <h3>🎁 VÍDEO BÔNUS</h3>
                    <div class="timer-circle" id="bonusTimer">30</div>
                    <div id="bonusText">Assista ao vídeo bônus completo</div>
                    <div class="aviso">💰 Ganhe R$ 0,50 de bônus!</div>
                    <button class="btn-fechar" id="btnBonus" disabled>Aguardando 30s...</button>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        let segundos = 0;
        const timer = setInterval(() => {
            segundos++;
            const restante = 30 - segundos;
            const timerDiv = document.getElementById('bonusTimer');
            const textDiv = document.getElementById('bonusText');
            if (timerDiv) timerDiv.textContent = restante;
            if (textDiv) textDiv.textContent = `⏳ ${restante} segundos restantes...`;
            
            if (segundos >= 30) {
                clearInterval(timer);
                const btn = document.getElementById('btnBonus');
                if (btn) {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    btn.textContent = '💰 RECEBER R$ 0,50';
                    btn.onclick = async () => {
                        await adicionarGanho(0.50, 'video_bonus');
                        fecharModal();
                        alert('✅ Você ganhou R$ 0,50 de bônus!');
                        anuncioAtivo = false;
                    };
                }
            }
        }, 1000);
    }
    
    // ============================================================
    // 10. CHECK-IN POR HORA
    // ============================================================
    
    async function fazerCheckIn() {
        const agora = Date.now();
        const ultimoCheckIn = USUARIO_ATUAL.ultimoCheckIn || 0;
        const horasPassadas = (agora - ultimoCheckIn) / (1000 * 60 * 60);
        
        if (horasPassadas < 1) {
            const minutosRestantes = Math.ceil(60 - (horasPassadas * 60));
            alert(`❌ Próximo check-in em ${minutosRestantes} minutos!`);
            return;
        }
        
        const premio = 0.05;
        USUARIO_ATUAL.ultimoCheckIn = agora;
        await salvarUsuarios();
        await adicionarGanho(premio, 'hourly_checkin');
        alert(`✅ Check-in realizado! Você ganhou R$ ${premio.toFixed(2)}! Volte daqui 1 hora.`);
    }
    
    // ============================================================
    // SAQUE PIX
    // ============================================================
    
    function abrirModalSaque() {
        if (USUARIO_ATUAL.saldo < VALOR_MINIMO_SAQUE) {
            alert(`❌ Saldo mínimo: R$ ${VALOR_MINIMO_SAQUE.toFixed(2)}\nSeu saldo: R$ ${USUARIO_ATUAL.saldo.toFixed(2)}`);
            return;
        }
        
        const modalHtml = `
            <div class="modal" id="saqueModal">
                <div class="modal-content">
                    <h3>💸 Saque via PIX</h3>
                    <div class="aviso">💰 Saldo: R$ ${USUARIO_ATUAL.saldo.toFixed(2)}<br>Mínimo: R$ ${VALOR_MINIMO_SAQUE.toFixed(2)}</div>
                    <input type="number" id="valorSaque" class="saque-input" placeholder="Valor" step="0.01" min="5" max="${USUARIO_ATUAL.saldo}">
                    <input type="text" id="chavePix" class="saque-input" placeholder="Chave PIX">
                    <input type="text" id="nomeTitular" class="saque-input" placeholder="Seu nome">
                    <button class="btn-sacar" id="confirmarSaqueBtn">📤 Solicitar Saque</button>
                    <button class="btn-fechar" onclick="fecharModal()">Cancelar</button>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        document.getElementById('confirmarSaqueBtn').onclick = async () => {
            const valor = parseFloat(document.getElementById('valorSaque').value);
            const chave = document.getElementById('chavePix').value;
            const nome = document.getElementById('nomeTitular').value;
            
            if (isNaN(valor) || valor <= 0 || valor > USUARIO_ATUAL.saldo || valor < VALOR_MINIMO_SAQUE || !chave || !nome) {
                alert('Preencha todos os campos corretamente');
                return;
            }
            
            const novoSaldo = USUARIO_ATUAL.saldo - valor;
            await atualizarSaldo(USUARIO_ATUAL.id, novoSaldo);
            
            HISTORICO.unshift({
                usuarioId: USUARIO_ATUAL.id,
                tipo: 'saque',
                valor: -valor,
                chavePix: chave,
                nomeTitular: nome,
                status: 'pendente',
                data: new Date().toISOString()
            });
            await salvarHistorico();
            
            fecharModal();
            renderizarConteudo();
            alert(`✅ Saque solicitado! R$ ${valor.toFixed(2)} para ${chave}\n⏳ Enviaremos em até 24h.`);
        };
    }
    
    // ============================================================
    // REGISTRO/LOGIN
    // ============================================================
    
    async function registrar() {
        const nome = document.getElementById('regNome').value;
        const email = document.getElementById('regEmail').value;
        const senha = document.getElementById('regSenha').value;
        const confirmar = document.getElementById('regConfirmar').value;
        
        if (!nome || !email || !senha || senha !== confirmar) {
            alert('Preencha todos os campos corretamente');
            return;
        }
        if (USUARIOS.find(u => u.email === email)) {
            alert('Email já cadastrado');
            return;
        }
        
        USUARIOS.push({
            id: 'user_' + Date.now(),
            nome, email, senha,
            saldo: 0,
            dataCadastro: new Date().toISOString(),
            dailyBonus: {},
            indicacoes: [],
            tarefasConcluidas: {}
        });
        await salvarUsuarios();
        alert('✅ Cadastro realizado! Faça login.');
        telaLogin();
    }
    
    async function fazerLogin() {
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;
        const manter = document.getElementById('manterLogin')?.checked || false;
        const user = USUARIOS.find(u => u.email === email && u.senha === senha);
        
        if (user) {
            USUARIO_ATUAL = user;
            await salvarSessao(user.id, manter);
            renderizarApp();
        } else {
            alert('Email ou senha incorretos');
        }
    }
    
    function logout() {
        USUARIO_ATUAL = null;
        limparSessao();
        renderizarApp();
    }
    
    function fecharModal() {
        document.querySelectorAll('.modal').forEach(m => m.remove());
        anuncioAtivo = false;
        girando = false;
    }
    
    // ============================================================
    // RENDERIZAÇÃO
    // ============================================================
    
    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
    
    function renderizarHome() {
        return `
            <div class="card saldo-card">
                <div>💰 SEU SALDO TOTAL</div>
                <div class="saldo-valor" id="saldoValor">${formatarMoeda(USUARIO_ATUAL.saldo)}</div>
                <div>💡 Mínimo para saque: ${formatarMoeda(VALOR_MINIMO_SAQUE)}</div>
            </div>
            
            <div class="card">
                <h3>✨ 10 FORMAS DE GANHAR DINHEIRO ✨</h3>
                <div class="grid-2">
                    <div class="opcao-card" onclick="assistirAnuncio()">
                        <div class="opcao-icone">📺</div>
                        <div class="opcao-titulo">Anúncios Vídeo</div>
                        <div class="opcao-premio">+ R$ 0,10</div>
                    </div>
                    <div class="opcao-card" onclick="girarRoleta()">
                        <div class="opcao-icone">🎰</div>
                        <div class="opcao-titulo">Roleta da Sorte</div>
                        <div class="opcao-premio">Até R$ 5,00</div>
                    </div>
                    <div class="opcao-card" onclick="reclamarBonusDiario()">
                        <div class="opcao-icone">📅</div>
                        <div class="opcao-titulo">Bônus Diário</div>
                        <div class="opcao-premio">+ R$ 0,10 a R$ 2,00</div>
                    </div>
                    <div class="opcao-card" onclick="gerarCodigoIndicacao()">
                        <div class="opcao-icone">👥</div>
                        <div class="opcao-titulo">Indicar Amigos</div>
                        <div class="opcao-premio">+ R$ 0,50/amigo</div>
                    </div>
                    <div class="opcao-card" onclick="jogarCliqueGanhe()">
                        <div class="opcao-icone">🎯</div>
                        <div class="opcao-titulo">Clique e Ganhe</div>
                        <div class="opcao-premio">Até R$ 1,00</div>
                    </div>
                    <div class="opcao-card" onclick="assistirVideoBonus()">
                        <div class="opcao-icone">🎁</div>
                        <div class="opcao-titulo">Vídeo Bônus</div>
                        <div class="opcao-premio">+ R$ 0,50</div>
                    </div>
                    <div class="opcao-card" onclick="fazerCheckIn()">
                        <div class="opcao-icone">⏰</div>
                        <div class="opcao-titulo">Check-in Horário</div>

                    </div>
                    <div class="opcao-card" onclick="participarSorteio()">
                        <div class="opcao-icone">🎲</div>
                        <div class="opcao-titulo">Sorteio Semanal</div>
                        <div class="opcao-premio">Prêmios especiais</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3>⭐ TAREFAS DIÁRIAS</h3>
                ${tarefasDiarias.map((t, i) => `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 8px; background: #2a2a3a; border-radius: 10px;">
                        <div>
                            <div>${t.nome}</div>
                            <small style="color: #ffd700;">+ R$ ${t.premio.toFixed(2)}</small>
                        </div>
                        <button class="btn-acao btn-pequeno" style="width: auto; padding: 8px 15px; margin: 0;" onclick="completarTarefa(${i})" ${t.concluida ? 'disabled style="opacity:0.5"' : ''}>${t.concluida ? '✅' : 'Fazer'}</button>
                    </div>
                `).join('')}
            </div>
            
            <div class="card">
                <h3>🎁 OFERTAS DIÁRIAS</h3>
                ${ofertas.map(o => `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 8px; background: #2a2a3a; border-radius: 10px;">
                        <div>
                            <div>${o.nome}</div>
                            <small style="color: #ffd700;">+ R$ ${o.premio.toFixed(2)}</small>
                        </div>
                        <button class="btn-acao btn-pequeno" style="width: auto; padding: 8px 15px; margin: 0;" onclick="completarOferta(${JSON.stringify(o).replace(/"/g, '&quot;')})">Fazer</button>
                    </div>
                `).join('')}
            </div>
        `;
    }
    
    function renderizarPerfil() {
        const historico = HISTORICO.filter(h => h.usuarioId === USUARIO_ATUAL.id);
        const totalGanho = historico.filter(h => h.valor > 0).reduce((s, h) => s + h.valor, 0);
        const totalSaque = Math.abs(historico.filter(h => h.tipo === 'saque').reduce((s, h) => s + h.valor, 0));
        const streak = USUARIO_ATUAL.dailyBonus?.streak || 0;
        
        return `
            <div class="perfil-header">
                <div class="perfil-avatar">👤</div>
                <div class="perfil-nome">${USUARIO_ATUAL.nome}</div>
                <div class="perfil-email">${USUARIO_ATUAL.email}</div>
                <div class="aviso" style="margin-top: 10px;">🔥 Sequência bônus: ${streak} dias</div>
            </div>
            
            <div class="card">
                <h3>📊 Resumo Financeiro</h3>
                <div>💰 Saldo: ${formatarMoeda(USUARIO_ATUAL.saldo)}</div>
                <div>📈 Total ganho: +${formatarMoeda(totalGanho)}</div>
                <div>💸 Total sacado: -${formatarMoeda(totalSaque)}</div>
                <div>👥 Amigos indicados: ${USUARIO_ATUAL.indicacoes?.length || 0}</div>
                <div class="progress-bar"><div class="progress-fill" style="width: ${(USUARIO_ATUAL.saldo / VALOR_MINIMO_SAQUE) * 100}%"></div></div>
                <div>Progresso para saque: ${Math.min(100, (USUARIO_ATUAL.saldo / VALOR_MINIMO_SAQUE) * 100).toFixed(0)}%</div>
            </div>
            
            <div class="card">
                <h3>💰 Saque PIX</h3>
                <button class="btn-sacar" onclick="abrirModalSaque()">💸 SACAR AGORA</button>
            </div>
            
            <div class="card">
                <h3>📜 Histórico</h3>
                ${historico.slice(0, 15).map(h => `
                    <div class="historico-item">
                        <div>
                            <div>${h.tipo === 'video_ad' ? '📺 Anúncio' : 
                                 h.tipo === 'roleta' ? '🎰 Roleta' :
                                 h.tipo === 'daily_bonus_dia' ? '📅 Bônus Diário' :
                                 h.tipo === 'click_game' ? '🎯 Jogo Clique' :
                                 h.tipo === 'video_bonus' ? '🎁 Vídeo Bônus' :
                                 h.tipo === 'hourly_checkin' ? '⏰ Check-in' :
                                 h.tipo === 'saque' ? '💸 Saque' : h.tipo}</div>
                            <div style="font-size: 10px;">${new Date(h.data).toLocaleString()}</div>
                        </div>
                        <div style="color: ${h.valor > 0 ? '#ffd700' : '#ff6b6b'}">${h.valor > 0 ? '+' : ''}${formatarMoeda(h.valor)}</div>
                    </div>

                <button class="login-btn" style="margin-top: 15px; background: #6c757d;" onclick="logout()">🚪 Sair</button>
            </div>
        `;
    }
    
    function renderizarConteudo() {
        const container = document.getElementById('mainContainer');
        if (!container) return;
        container.innerHTML = ABA_ATUAL === 'home' ? renderizarHome() : renderizarPerfil();
        
        const saldoHeader = document.getElementById('saldoHeader');
        if (saldoHeader) saldoHeader.innerHTML = `💰 ${formatarMoeda(USUARIO_ATUAL.saldo)}`;
    }
    
    function mudarAba(aba) {
        ABA_ATUAL = aba;
        document.querySelectorAll('.nav-item').forEach(el => {
            if (el.dataset.tab === aba) el.classList.add('active');
            else el.classList.remove('active');
        });
        renderizarConteudo();
    }
    
    function telaLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-screen">
                <div class="login-box">
                    <h1>💰 MultiGanhos</h1>
                    <input type="email" id="loginEmail" class="login-input" placeholder="Email" value="teste@email.com">
                    <input type="password" id="loginSenha" class="login-input" placeholder="Senha" value="123456">
                    <label><input type="checkbox" id="manterLogin"> Manter conectado</label>

                </div>
            </div>
        `;

                    <div class="nav-label">Perfil</div>
                </div>
            </div>

        renderizarConteudo();
    }

    window.telaLogin = telaLogin;

    window.gerarCodigoIndicacao = gerarCodigoIndicacao;
    window.jogarCliqueGanhe = jogarCliqueGanhe;
    window.assistirVideoBonus = assistirVideoBonus;
    window.fazerCheckIn = fazerCheckIn;
    window.participarSorteio = participarSorteio;
    window.completarTarefa = completarTarefa;
    window.completarOferta = completarOferta;

    // ============================================================
    
    async function iniciar() {
        try {
            await abrirDB();

            console.error('Erro:', error);

    iniciar();
</script>
