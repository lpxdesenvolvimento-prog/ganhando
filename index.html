    function abrirDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('MoneyAdsDB', 7);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => { db = request.result; resolve(db); };
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('usuarios')) db.createObjectStore('usuarios', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('historico')) db.createObjectStore('historico', { keyPath: 'id', autoIncrement: true });
                if (!db.objectStoreNames.contains('sessao')) db.createObjectStore('sessao', { keyPath: 'id' });
            };
        });
    }
    
    async function carregarUsuarios() {
        if (!db) await abrirDB();
        return new Promise((resolve) => {
            const transaction = db.transaction(['usuarios'], 'readonly');
            const request = transaction.objectStore('usuarios').getAll();
            request.onsuccess = () => {
                USUARIOS = request.result || [];
                if (USUARIOS.length === 0) {
                    USUARIOS.push({
                        id: 'user1', nome: 'Usuário Teste', email: 'teste@email.com', senha: '123456',
                        saldo: 0, dataCadastro: new Date().toISOString(), dailyBonus: { streak: 0 },
                        indicacoes: [], ultimoCheckIn: 0, ultimoSorteio: 0, tarefasFeitas: {}
                    });
                    salvarUsuarios();
                }
                resolve();
            };
        });
    }
    
    async function salvarUsuarios() {
        const transaction = db.transaction(['usuarios'], 'readwrite');
        const store = transaction.objectStore('usuarios');
        store.clear();
        USUARIOS.forEach(u => store.add(u));
    }
    
    async function carregarHistorico() {
        if (!db) await abrirDB();
        return new Promise((resolve) => {
            const transaction = db.transaction(['historico'], 'readonly');
            const request = transaction.objectStore('historico').getAll();
            request.onsuccess = () => { HISTORICO = request.result || []; resolve(); };
        });
    }
    
    async function salvarHistorico() {
        const transaction = db.transaction(['historico'], 'readwrite');
        const store = transaction.objectStore('historico');
        store.clear();
        HISTORICO.forEach(h => store.add(h));
    }
    
    async function carregarSessao() {
        if (!db) await abrirDB();
        return new Promise((resolve) => {
            const transaction = db.transaction(['sessao'], 'readonly');
            const request = transaction.objectStore('sessao').get('atual');
            request.onsuccess = () => {
                const sessao = request.result;
                if (sessao && sessao.expira > Date.now()) {
                    USUARIO_ATUAL = USUARIOS.find(u => u.id === sessao.usuarioId);
                }
                resolve();
            };
        });
    }
    
    async function salvarSessao(usuarioId, manter) {
        const transaction = db.transaction(['sessao'], 'readwrite');
        transaction.objectStore('sessao').put({
            id: 'atual', usuarioId: usuarioId,
            expira: manter ? Date.now() + (30 * 24 * 60 * 60 * 1000) : Date.now() + (24 * 60 * 60 * 1000)
        });
    }
    
    async function limparSessao() {
        const transaction = db.transaction(['sessao'], 'readwrite');
        transaction.objectStore('sessao').delete('atual');
    }

    const tarefasDiarias = [
        { nome: "👤 Completar Perfil", premio: 0.50, feito: false },
        { nome: "🔗 Compartilhar App", premio: 0.30, feito: false },
        { nome: "⭐ Avaliar App", premio: 0.40, feito: false }
    ];
    
    async function completarTarefa(index) {
        const tarefa = tarefasDiarias[index];
        const hoje = new Date().toISOString().split('T')[0];
        const key = `tarefa_${index}_${hoje}`;
        
        if (USUARIO_ATUAL.tarefasFeitas?.[key]) {
            alert('❌ Você já completou esta tarefa hoje!');
            return;
        }
        
        if (!USUARIO_ATUAL.tarefasFeitas) USUARIO_ATUAL.tarefasFeitas = {};
        USUARIO_ATUAL.tarefasFeitas[key] = true;
        await salvarUsuarios();
        await adicionarGanho(tarefa.premio, `tarefa_${tarefa.nome}`);
        alert(`✅ ${tarefa.nome} concluída! +R$ ${tarefa.premio.toFixed(2)}`);
        renderizarConteudo();
    }
    
    // 10. OFERTAS (Links reais)
    function completarOferta(oferta) {
        const modalHtml = `
            <div class="modal" id="ofertaModal">
                <div class="modal-content">
                    <h3>${oferta.nome}</h3>
                    <div class="aviso">💰 Você ganhará R$ ${oferta.premio.toFixed(2)} após completar</div>
                    <a href="${oferta.link}" target="_blank" class="btn-acao" style="display: block; text-decoration: none; text-align: center;">✨ Ir para Oferta ✨</a>
                    <button class="btn-fechar" onclick="fecharModal()">Cancelar</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        setTimeout(async () => {
            const key = `oferta_${oferta.nome}_${new Date().toISOString().split('T')[0]}`;
            if (!USUARIO_ATUAL.ofertasFeitas?.[key]) {
                if (!USUARIO_ATUAL.ofertasFeitas) USUARIO_ATUAL.ofertasFeitas = {};
                USUARIO_ATUAL.ofertasFeitas[key] = true;
                await salvarUsuarios();
                await adicionarGanho(oferta.premio, `oferta_${oferta.nome}`);
                alert(`✅ Oferta concluída! +R$ ${oferta.premio.toFixed(2)}`);
                fecharModal();
                renderizarConteudo();
            }
        }, 60000);
    }
    
    // SAQUE PIX
    function abrirModalSaque() {
        if (USUARIO_ATUAL.saldo < VALOR_MINIMO_SAQUE) {
            alert(`❌ Mínimo: R$ ${VALOR_MINIMO_SAQUE.toFixed(2)}\nSeu saldo: R$ ${USUARIO_ATUAL.saldo.toFixed(2)}`);
            return;
        }
        
        const modalHtml = `
            <div class="modal" id="saqueModal">
                <div class="modal-content">
                    <h3>💸 SAQUE VIA PIX</h3>
                    <div class="aviso">💰 Saldo: R$ ${USUARIO_ATUAL.saldo.toFixed(2)}</div>
                    <input type="number" id="valorSaque" class="saque-input" placeholder="Valor" step="0.01" min="5" max="${USUARIO_ATUAL.saldo}">
                    <input type="text" id="chavePix" class="saque-input" placeholder="Chave PIX (CPF/Email/Telefone)">
                    <input type="text" id="nomeTitular" class="saque-input" placeholder="Seu nome completo">
                    <button class="btn-sacar" id="confirmarSaqueBtn">📤 SOLICITAR SAQUE</button>
                    <button class="btn-fechar" onclick="fecharModal()">Cancelar</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        document.getElementById('confirmarSaqueBtn').onclick = async () => {
            const valor = parseFloat(document.getElementById('valorSaque').value);
            const chave = document.getElementById('chavePix').value;
            const nome = document.getElementById('nomeTitular').value;
            
            if (isNaN(valor) || valor <= 0 || valor > USUARIO_ATUAL.saldo || valor < VALOR_MINIMO_SAQUE || !chave || !nome) {
                alert('Preencha todos os campos corretamente');
                return;
            }
            
            USUARIO_ATUAL.saldo -= valor;
            await salvarUsuarios();
            HISTORICO.unshift({
                usuarioId: USUARIO_ATUAL.id, tipo: 'saque', valor: -valor,
                chavePix: chave, nomeTitular: nome, status: 'pendente', data: new Date().toISOString()
            });
            await salvarHistorico();
            fecharModal();
            renderizarConteudo();
            alert(`✅ Saque solicitado!\nValor: R$ ${valor.toFixed(2)}\nChave: ${chave}\n\n⏳ Enviaremos em até 24h.`);
            console.log(`🔔 NOVO SAQUE: ${nome} - R$ ${valor} - PIX: ${chave}`);
        };
    }
    
    // ============================================================
    // LOGIN/REGISTRO
    // ============================================================
    
    async function registrar() {
        const nome = document.getElementById('regNome').value;
        const email = document.getElementById('regEmail').value;
        const senha = document.getElementById('regSenha').value;
        const confirmar = document.getElementById('regConfirmar').value;
        
        if (!nome || !email || !senha || senha !== confirmar) {
            alert('Preencha todos os campos');
            return;
        }
        if (USUARIOS.find(u => u.email === email)) {
            alert('Email já cadastrado');
            return;
        }
        
        USUARIOS.push({
            id: 'user_' + Date.now(), nome, email, senha, saldo: 0,
            dataCadastro: new Date().toISOString(), dailyBonus: { streak: 0 },
            indicacoes: [], ultimoCheckIn: 0, ultimoSorteio: 0, tarefasFeitas: {}, ofertasFeitas: {}
        });
        await salvarUsuarios();
        alert('✅ Cadastro realizado! Faça login.');
        telaLogin();
    }
    
    async function fazerLogin() {
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;
        const manter = document.getElementById('manterLogin')?.checked || false;
        const user = USUARIOS.find(u => u.email === email && u.senha === senha);
        
        if (user) {
            USUARIO_ATUAL = user;
            await salvarSessao(user.id, manter);
            renderizarApp();
        } else {
            alert('Email ou senha incorretos');
        }
    }
    
    function logout() {
        USUARIO_ATUAL = null;
        limparSessao();
        renderizarApp();
    }
    
    function fecharModal() {
        document.querySelectorAll('.modal').forEach(m => m.remove());
        anuncioAtivo = false;
    }
    
    // ============================================================
    // RENDERIZAÇÃO
    // ============================================================
    
    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
    
    const ofertas = [
        { nome: "📱 Baixar App Recomendado", premio: 1.00, link: "https://play.google.com/store/apps" },
        { nome: "📝 Responder Pesquisa", premio: 2.00, link: "https://google.com" },
        { nome: "🎮 Jogar Demo Grátis", premio: 0.50, link: "https://poki.com" },
        { nome: "📧 Cadastrar Newsletter", premio: 0.30, link: "https://mailchimp.com" }
    ];
    
    function renderizarHome() {
        const streak = USUARIO_ATUAL.dailyBonus?.streak || 0;
        
        return `
            <div class="card saldo-card">
                <div>💰 SEU SALDO</div>
                <div class="saldo-valor" id="saldoValor">${formatarMoeda(USUARIO_ATUAL.saldo)}</div>
                <div>💡 Mínimo saque: ${formatarMoeda(VALOR_MINIMO_SAQUE)}</div>
                <div>🔥 Sequência: ${streak} dias</div>
                <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(100, (USUARIO_ATUAL.saldo / VALOR_MINIMO_SAQUE) * 100)}%"></div></div>
            </div>
            
            <div class="card">
                <h3>✨ 10 FORMAS DE GANHAR ✨</h3>
                <div class="grid-2">
                    <div class="opcao-card" onclick="assistirAnuncio()"><div class="opcao-icone">📺</div><div class="opcao-titulo">Anúncios Vídeo</div><div class="opcao-premio">+ R$ 0,10</div></div>
                    <div class="opcao-card" onclick="girarRoleta()"><div class="opcao-icone">🎰</div><div class="opcao-titulo">Roleta da Sorte</div><div class="opcao-premio">Até R$ 2,00</div></div>
                    <div class="opcao-card" onclick="reclamarBonusDiario()"><div class="opcao-icone">📅</div><div class="opcao-titulo">Bônus Diário</div><div class="opcao-premio">Até R$ 2,00</div></div>
                    <div class="opcao-card" onclick="gerarCodigoIndicacao()"><div class="opcao-icone">👥</div><div class="opcao-titulo">Indicar Amigos</div><div class="opcao-premio">+ R$ 0,50/amigo</div></div>
                    <div class="opcao-card" onclick="jogarCliqueGanhe()"><div class="opcao-icone">🎯</div><div class="opcao-titulo">Clique e Ganhe</div><div class="opcao-premio">Até R$ 0,60</div></div>
                    <div class="opcao-card" onclick="assistirVideoBonus()"><div class="opcao-icone">🎁</div><div class="opcao-titulo">Vídeo Bônus</div><div class="opcao-premio">+ R$ 0,50</div></div>
                    <div class="opcao-card" onclick="fazerCheckIn()"><div class="opcao-icone">⏰</div><div class="opcao-titulo">Check-in Horário</div><div class="opcao-premio">+ R$ 0,05/hora</div></div>
                    <div class="opcao-card" onclick="participarSorteio()"><div class="opcao-icone">🎲</div><div class="opcao-titulo">Sorteio Semanal</div><div class="opcao-premio">Prêmios</div></div>
                </div>
            </div>
            
            <div class="card">
                <h3>⭐ TAREFAS DIÁRIAS</h3>
                ${tarefasDiarias.map((t, i) => {
                    const hoje = new Date().toISOString().split('T')[0];
                    const feita = USUARIO_ATUAL.tarefasFeitas?.[`tarefa_${i}_${hoje}`];
                    return `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 8px; background: #2a2a3a; border-radius: 10px;">
                            <div><div>${t.nome}</div><small style="color:#ffd700;">+ R$ ${t.premio.toFixed(2)}</small></div>
                            <button class="btn-acao btn-pequeno" onclick="completarTarefa(${i})" ${feita ? 'disabled style="opacity:0.5"' : ''}>${feita ? '✅' : 'Fazer'}</button>
                        </div>
                    `;
                }).join('')}
            </div>
            
            <div class="card">
                <h3>🎁 OFERTAS EXCLUSIVAS</h3>
                ${ofertas.map(o => `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 8px; background: #2a2a3a; border-radius: 10px;">
                        <div><div>${o.nome}</div><small style="color:#ffd700;">+ R$ ${o.premio.toFixed(2)}</small></div>
                        <button class="btn-acao btn-pequeno" onclick="completarOferta(${JSON.stringify(o).replace(/"/g, '&quot;')})">Fazer</button>
                    </div>
                `).join('')}
            </div>
        `;
    }
    
    function renderizarPerfil() {
        const historico = HISTORICO.filter(h => h.usuarioId === USUARIO_ATUAL.id);
        const totalGanho = historico.filter(h => h.valor > 0).reduce((s, h) => s + h.valor, 0);
        const totalSaque = Math.abs(historico.filter(h => h.tipo === 'saque').reduce((s, h) => s + h.valor, 0));
        
        return `
            <div class="perfil-header">
                <div class="perfil-avatar">👤</div>
                <div class="perfil-nome">${USUARIO_ATUAL.nome}</div>
                <div class="perfil-email">${USUARIO_ATUAL.email}</div>
            </div>
            
            <div class="card">
                <h3>📊 RESUMO FINANCEIRO</h3>
                <div>💰 Saldo: ${formatarMoeda(USUARIO_ATUAL.saldo)}</div>
                <div>📈 Total ganho: +${formatarMoeda(totalGanho)}</div>
                <div>💸 Total sacado: -${formatarMoeda(totalSaque)}</div>
                <div>👥 Amigos indicados: ${USUARIO_ATUAL.indicacoes?.length || 0}</div>
            </div>
            
            <div class="card">
                <h3>💰 SAQUE VIA PIX</h3>
                <button class="btn-sacar" onclick="abrirModalSaque()">💸 SACAR AGORA</button>
                <div class="aviso" style="margin-top:10px;">Mínimo: ${formatarMoeda(VALOR_MINIMO_SAQUE)}</div>
            </div>
            
            <div class="card">
                <h3>📜 HISTÓRICO</h3>
                ${historico.slice(0, 15).map(h => `
                    <div class="historico-item">
                        <div><div>${h.tipo === 'video_ad' ? '📺 Anúncio' : h.tipo === 'roleta' ? '🎰 Roleta' : h.tipo === 'daily_bonus_dia' ? '📅 Bônus' : h.tipo === 'click_game' ? '🎯 Jogo' : h.tipo === 'video_bonus' ? '🎁 Bônus' : h.tipo === 'hourly_checkin' ? '⏰ Check-in' : h.tipo === 'saque' ? '💸 Saque' : h.tipo}</div>
                        <div style="font-size:10px;">${new Date(h.data).toLocaleString()}</div></div>
                        <div style="color:${h.valor > 0 ? '#ffd700' : '#ff6b6b'}">${h.valor > 0 ? '+' : ''}${formatarMoeda(h.valor)}</div>
                    </div>
                `).join('')}
                <button class="login-btn" style="margin-top:15px; background:#6c757d;" onclick="logout()">🚪 SAIR</button>
            </div>
        `;
    }
    
    function renderizarConteudo() {
        const container = document.getElementById('mainContainer');
        if (!container) return;
        container.innerHTML = ABA_ATUAL === 'home' ? renderizarHome() : renderizarPerfil();
        const saldoHeader = document.getElementById('saldoHeader');
        if (saldoHeader) saldoHeader.innerHTML = `💰 ${formatarMoeda(USUARIO_ATUAL.saldo)}`;
    }
    
    function mudarAba(aba) {
        ABA_ATUAL = aba;
        document.querySelectorAll('.nav-item').forEach(el => {
            if (el.dataset.tab === aba) el.classList.add('active');
            else el.classList.remove('active');
        });
        renderizarConteudo();
    }
    
    function telaLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-screen">
                <div class="login-box">
                    <h1>💰 MultiGanhos</h1>
                    <input type="email" id="loginEmail" class="login-input" placeholder="Email" value="teste@email.com">
                    <input type="password" id="loginSenha" class="login-input" placeholder="Senha" value="123456">
                    <label style="display:flex; gap:8px; margin:10px 0;"><input type="checkbox" id="manterLogin"> Manter conectado</label>
                    <button class="login-btn" onclick="fazerLogin()">✨ ENTRAR ✨</button>
                    <div class="switch-btn" onclick="telaRegistro()">Criar nova conta</div>
                </div>
            </div>
        `;
    }
    
    function telaRegistro() {
        document.getElementById('app').innerHTML = `
            <div class="login-screen">
                <div class="login-box">
                    <h1>📝 CRIAR CONTA</h1>
                    <input type="text" id="regNome" class="login-input" placeholder="Nome completo">
                    <input type="email" id="regEmail" class="login-input" placeholder="Email">
                    <input type="password" id="regSenha" class="login-input" placeholder="Senha">
                    <input type="password" id="regConfirmar" class="login-input" placeholder="Confirmar senha">
                    <button class="login-btn" onclick="registrar()">✅ CADASTRAR</button>
                    <div class="switch-btn" onclick="telaLogin()">Já tenho conta</div>
                </div>
            </div>
        `;
    }
    
    async function renderizarApp() {
        if (!USUARIO_ATUAL) { telaLogin(); return; }
        
        document.getElementById('app').innerHTML = `
            <div class="header">
                <div class="logo">💰 MultiGanhos</div>
                <div class="saldo-header" id="saldoHeader">💰 ${formatarMoeda(USUARIO_ATUAL.saldo)}</div>
            </div>
            <div class="main-content" id="mainContainer"></div>
            <div class="bottom-nav">
                <div class="nav-item ${ABA_ATUAL === 'home' ? 'active' : ''}" data-tab="home" onclick="mudarAba('home')"><div class="nav-icon">🏠</div><div class="nav-label">Início</div></div>
                <div class="nav-item ${ABA_ATUAL === 'perfil' ? 'active' : ''}" data-tab="perfil" onclick="mudarAba('perfil')"><div class="nav-icon">👤</div><div class="nav-label">Perfil</div></div>
            </div>
        `;
        renderizarConteudo();
    }
    
    // EXPOR FUNÇÕES GLOBAIS
    window.fazerLogin = fazerLogin;
    window.registrar = registrar;
    window.telaLogin = telaLogin;
    window.telaRegistro = telaRegistro;
    window.assistirAnuncio = assistirAnuncio;
    window.girarRoleta = girarRoleta;
    window.reclamarBonusDiario = reclamarBonusDiario;
    window.gerarCodigoIndicacao = gerarCodigoIndicacao;
    window.jogarCliqueGanhe = jogarCliqueGanhe;
    window.assistirVideoBonus = assistirVideoBonus;
    window.fazerCheckIn = fazerCheckIn;
    window.participarSorteio = participarSorteio;
    window.completarTarefa = completarTarefa;
    window.completarOferta = completarOferta;
    window.abrirModalSaque = abrirModalSaque;
    window.mudarAba = mudarAba;
    window.logout = logout;
    window.fecharModal = fecharModal;
    window.copiarTexto = copiarTexto;
    
    // INICIAR
    async function iniciar() {
        try {
            await abrirDB();
            await carregarUsuarios();
            await carregarHistorico();
            await carregarSessao();
            carregarScriptsAnuncio();
            renderizarApp();
            console.log('🚀 App funcionando 100%! Todos os botões conectados!');
        } catch (error) {
            console.error('Erro:', error);
            document.getElementById('app').innerHTML = '<div style="text-align:center; padding:50px; color:white;">❌ Erro ao carregar. Recarregue a página.</div>';
        }
    }
    
    iniciar();
</script>

</body>
</html>
